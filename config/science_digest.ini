[digest]
title = Whole Metagenome Sequencing in Human Health
lookback_days = 7
retention_days = 31
max_papers = 10
min_relevance_score = 3
podcast_target_minutes = 10
output_dir = docs

[openai]
summary_model = gpt-5.4-mini
tts_model = gpt-4o-mini-tts
voice = marin

[queries]
europe_pmc =
    (
      ("whole metagenome sequencing" OR "whole-metagenome sequencing" OR "whole genome shotgun" OR "shotgun metagenomic" OR "shotgun metagenomics" OR "metagenomic sequencing")
      AND
      (human OR patient OR clinical OR health OR disease OR microbiome OR gut OR oral OR skin OR respiratory OR urogenital OR cancer OR infection)
    )
    OR
    (
      (metagenomic OR metagenomics OR microbiome)
      AND
      (benchmark OR benchmarking OR pipeline OR workflow OR software OR tool OR database OR "taxonomic profiling" OR "functional profiling" OR assembly OR binning OR "strain profiling" OR "quality control" OR "host depletion")
    )

arxiv =
    (all:metagenomic OR all:metagenomics OR all:microbiome)
    AND
    (all:benchmark OR all:benchmarking OR all:pipeline OR all:workflow OR all:software OR all:tool OR all:database OR all:assembly OR all:binning OR all:shotgun OR all:sequencing)

[ranking]
core_terms =
    whole metagenome
    whole-metagenome
    shotgun metagenomic
    shotgun metagenomics
    metagenomic sequencing
    metagenomics
    metagenomic

human_health_terms =
    human
    patient
    clinical
    health
    disease
    infection
    cancer
    gut microbiome
    oral microbiome
    skin microbiome
    respiratory microbiome
    urogenital microbiome
    antimicrobial resistance
    pathogen

methods_terms =
    benchmark
    benchmarking
    pipeline
    workflow
    software
    tool
    database
    taxonomic profiling
    functional profiling
    assembly
    binning
    metagenome-assembled genome
    MAG
    strain profiling
    quality control
    host depletion
