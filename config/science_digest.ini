[digest]
title = Female Reproductive Health Metagenomics
lookback_days = 7
retention_days = 31
max_papers = 10
min_relevance_score = 3
podcast_target_minutes = 10
output_dir = docs

[sources]
enable_europe_pmc = true
enable_arxiv = false

[audio]
enabled = true
provider = edge_tts
voice = en-GB-RyanNeural
rate = +0%

[doi]
enable_crossref_lookup = true
crossref_mailto =

[notion]
enabled = true
title_property = ENTRY

[queries]
europe_pmc =
    (
      ("whole metagenome sequencing" OR "whole-metagenome sequencing" OR "whole genome shotgun" OR "shotgun metagenomic" OR "shotgun metagenomics" OR "metagenomic sequencing" OR "shotgun sequencing" OR metagenomics OR microbiome OR microbiota)
      AND
      (human OR patient OR clinical OR medicine OR health OR disease OR diagnosis OR biomarker OR treatment OR cohort)
      AND
      (female OR woman OR women OR maternal OR pregnancy OR pregnant OR obstetric OR gynecologic OR gynaecologic OR reproductive OR vaginal OR cervicovaginal OR cervical OR endometrial OR placenta OR placental OR vulvovaginal OR urogenital OR fertility OR infertility OR IVF OR miscarriage OR preterm OR menopause OR endometriosis OR PCOS OR "polycystic ovary" OR "bacterial vaginosis" OR HPV OR "sexually transmitted")
    )
    OR
    (
      (metagenomic OR metagenomics OR microbiome OR microbiota)
      AND
      (benchmark OR benchmarking OR pipeline OR workflow OR software OR tool OR database OR "taxonomic profiling" OR "functional profiling" OR assembly OR binning OR "strain profiling" OR "quality control" OR "host depletion")
      AND
      (human OR patient OR clinical OR medicine)
      AND
      (female OR woman OR women OR maternal OR pregnancy OR pregnant OR obstetric OR gynecologic OR gynaecologic OR reproductive OR vaginal OR cervicovaginal OR cervical OR endometrial OR placenta OR placental OR vulvovaginal OR urogenital OR fertility OR infertility OR IVF OR miscarriage OR preterm OR menopause OR endometriosis OR PCOS OR "polycystic ovary" OR "bacterial vaginosis" OR HPV OR "sexually transmitted")
    )

arxiv =
    (all:metagenomic OR all:metagenomics OR all:microbiome OR all:microbiota)
    AND (all:human OR all:clinical OR all:patient OR all:medical OR all:medicine)
    AND (all:female OR all:women OR all:woman OR all:vaginal OR all:cervicovaginal OR all:pregnancy OR all:maternal OR all:reproductive OR all:gynecologic OR all:gynaecologic OR all:urogenital OR all:fertility OR all:endometriosis OR all:PCOS)
    AND (all:benchmark OR all:benchmarking OR all:pipeline OR all:workflow OR all:software OR all:tool OR all:database OR all:assembly OR all:binning OR all:shotgun OR all:sequencing OR all:health OR all:disease)

